<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/png" href="logo_favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Map the Gap NYC</title>
<style>
  :root {
    --paper: #EDECE5; --card: #FBFAF6; --ink: #14181F; --gray: #5B6472;
    --line: #14181F; --hair: #D8D6CB; --red: #C1272D; --red-dark: #6B1414;
    --amber: #C99A2E; --teal: #1F6F5C; --pink-bg: #F5E1DF;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 18px 80px; }
  .topnav { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
    margin-bottom:26px; padding-bottom:14px; border-bottom:1.5px solid var(--line); }
  .brand { font-size:12px; font-weight:900; letter-spacing:0.06em; text-transform:uppercase; }
  .brand a { color: var(--ink); text-decoration: none; }
  .brand-link { display: inline-flex; align-items: center; text-decoration: none; }
  .brand-logo { height: 110px; width: auto; display: block; }
  @media (max-width: 480px) { .brand-logo { height: 78px; } }
  .navlinks { display:flex; gap:16px; }
  .navlinks a { font-size:13px; font-weight:700; color:var(--ink); text-decoration:none;
    border-bottom:2px solid transparent; padding-bottom:1px; }
  .navlinks a:hover, .navlinks a.current { border-bottom-color:var(--red); }
  h2.section { font-size: 26px; font-weight: 900; letter-spacing: -0.01em; margin: 0 0 8px; }
  p.section-note { font-size: 14px; color: var(--gray); line-height: 1.5; margin: 0 0 18px; max-width: 560px; }
  section.block { margin-bottom: 44px; }
  .about-body { font-size:15.5px; line-height:1.65; color:#2C3340; max-width:640px; }
  .about-body p { margin:0 0 16px; }
  .about-body a { color:var(--red); font-weight:700; }
  .fig { background:var(--card); border:2px solid var(--line); border-radius:3px; padding:20px 22px 22px; margin:20px 0; }
  .fig h4 { font-size:13px; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; margin:0 0 4px; }
  .fig .fignote { font-size:11.5px; color:var(--gray); margin:0 0 16px; line-height:1.4; }
  .fbar { margin-bottom:13px; }
  .fbar .fl { display:flex; justify-content:space-between; gap:10px; font-size:12.5px; margin-bottom:5px; }
  .fbar .fl b { font-family:ui-monospace,"SF Mono",Menlo,monospace; white-space:nowrap; }
  .ftrack { position:relative; height:24px; background:#EEECE3; border:1.5px solid var(--line); border-radius:2px; }
  .ffill { position:absolute; left:0; top:0; bottom:0; }
  .amiline { position:absolute; top:-6px; bottom:-6px; width:0; border-left:2.5px dashed var(--red); }
  .amitag { font-size:10.5px; color:var(--red); font-weight:700; margin-top:8px; }
  .contact-card { background:var(--card); border:2px solid var(--line); border-radius:3px; padding:24px; }
  .contact-card .email-line { font-size:14px; margin-bottom:18px; }
  .contact-card .email-line a { color:var(--red); font-weight:700; }
  label.field-label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  input[type="text"] { width:100%; padding:12px 14px; font-size:15px; font-family:inherit;
    border:1.5px solid var(--line); border-radius:2px; background:#EEECE3; margin-bottom:18px; }
  textarea { width:100%; padding:12px 14px; font-size:15px; font-family:inherit; border:1.5px solid var(--line);
    border-radius:2px; background:#EEECE3; margin-bottom:18px; min-height:110px; resize:vertical; }
  button.cta { width: 100%; background: var(--ink); color: var(--paper); border: none; padding: 15px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; border-radius: 2px; cursor: pointer; font-family: inherit; }
  .foot-note { font-size: 11.5px; color: var(--gray); line-height: 1.5; padding: 14px 0 4px; }
</style>
</head>
<body>
<div class="wrap">
  <nav class="topnav">
    <a href="index.html" class="brand-link" aria-label="Map the Gap NYC — home"><img src="logo_transparent.png" alt="Map the Gap NYC" class="brand-logo"></a>
    <div class="navlinks">
      <a href="index.html">Map</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="current">Contact</a>
    </div>
  </nav>

  <section class="block" id="contact">
    <h2 class="section">Contact</h2>
    <p class="section-note">Questions, corrections, data suggestions, or collaboration — reach out.</p>
    <div class="contact-card">
      <div class="email-line">Email: <a href="mailto:mapthegapnyc@gmail.com">mapthegapnyc@gmail.com</a></div>
      <label class="field-label">Your name</label>
      <input type="text" id="ctName" placeholder="Name" />
      <label class="field-label">Message</label>
      <textarea id="ctMsg" placeholder="Your message&hellip;"></textarea>
      <button class="cta" onclick="sendContact()">Send message</button>
      <div class="foot-note" style="padding-top:12px;">Sending opens your email app with the message pre-filled, addressed to mapthegapnyc@gmail.com.</div>
    </div>
  </section>
</div>
<script>
function sendContact() {
  const name = document.getElementById('ctName').value.trim();
  const msg = document.getElementById('ctMsg').value.trim();
  if (!msg) { alert("Write a message first."); return; }
  const subject = encodeURIComponent("Map the Gap NYC — message" + (name ? " from " + name : ""));
  const body = encodeURIComponent(msg + (name ? "\n\n— " + name : ""));
  window.location.href = "mailto:mapthegapnyc@gmail.com?subject=" + subject + "&body=" + body;
}
</script>
</body>
</html>
